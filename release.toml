adapters = ["generic"]

[[package]]
name = "otf-release"
adapter = "generic"
mode = "build-only"
matrix = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
command = "rustup target add ${{ matrix.target }} && cargo build --release --target ${{ matrix.target }}"
artifacts = "target/${{ matrix.target }}/release/otf-release${{ matrix.ext }}"
manifest = "Cargo.toml"
version_field = "version"
