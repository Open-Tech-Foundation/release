adapters = ["generic"]
tag_format = "v{version}"
provider = "github"
changelog_strategy = "curated"
changelog_scope = "root"
github_release_notes = "curated-changelog"

[hooks]

[[package]]
name = "otf-release"
adapter = "generic"
mode = "build-only"
matrix = true
command = "cargo build --release --target {triple}"
artifacts = "target/{triple}/release/{bin}{ext}"
bin_name = "otf-release"
manifest = "Cargo.toml"
version_field = "version"

[[package.targets]]
name = "linux"
arch = "x86_64"

[[package.targets]]
name = "linux"
arch = "aarch64"

[[package.targets]]
name = "macos"
arch = "x86_64"

[[package.targets]]
name = "macos"
arch = "aarch64"

[[package.targets]]
name = "windows"
arch = "x86_64"

# Built natively inside a FreeBSD guest on the Linux runner (vmactions/freebsd-vm).
# x86_64 only for now: the aarch64 leg is fully emulated and much slower.
[[package.targets]]
name = "freebsd"
arch = "x86_64"
