adapters = ["generic"]
tag_format = "v{version}"

# This repo generates its own workflow from an unreleased working tree, so the default pin (the
# generating binary's version) would point at a tag that does not exist yet and the release could
# never install its own tooling. Pin to the newest *released* version instead, and bump it after a
# release when you want CI to pick up newer tooling.
otf_release_version = "v0.25.0"
provider = "github"
changelog_strategy = "curated"
changelog_scope = "root"
github_release_notes = "curated-changelog"

[hooks]

[[package]]
name = "otf-release"
adapter = "generic"
mode = "build-only"
matrix = true
command = "cargo build --release --target {triple}"
artifacts = "target/{triple}/release/{bin}{ext}"
bin_name = "otf-release"
manifest = "Cargo.toml"
version_field = "version"
checksums = true
attest = true

[[package.targets]]
name = "linux"
arch = "x86_64"

[[package.targets]]
name = "linux"
arch = "aarch64"

[[package.targets]]
name = "macos"
arch = "x86_64"

[[package.targets]]
name = "macos"
arch = "aarch64"

[[package.targets]]
name = "windows"
arch = "x86_64"

# Built natively inside a FreeBSD guest on the Linux runner (vmactions/freebsd-vm).
# x86_64 only for now: the aarch64 leg is fully emulated and much slower.
[[package.targets]]
name = "freebsd"
arch = "x86_64"
