name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { package: "opentf-release", target: "x86_64-unknown-linux-gnu", os: "ubuntu-latest" }  # edit me
          - { package: "opentf-release", target: "aarch64-apple-darwin", os: "macos-latest" }  # edit me
          - { package: "opentf-release", target: "x86_64-pc-windows-msvc", os: "windows-latest" }  # edit me
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build ${{ matrix.package }} for ${{ matrix.target }}
        run: cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/  # edit me: narrow to the built binary

  release:
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"  # edit me: [workspace.package] version
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi
          gh release create "$tag" --title "$tag" --generate-notes .artifacts/**/*
