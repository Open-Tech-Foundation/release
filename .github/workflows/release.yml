name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$version" = "0.0.0" ]; then
            echo "Version is 0.0.0 (unreleased); skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tag="v$version"
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
            echo "Tag $tag already exists; nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  matrix-otf-release:
    needs: [check-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install otf-release
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - id: set
        run: echo "matrix=$(otf-release matrix --package otf-release)" >> "$GITHUB_OUTPUT"

  build-otf-release:
    needs: [check-release, matrix-otf-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-otf-release.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.arch }}-linux-gnu
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - name: Install otf-release
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - name: Build otf-release
        run: otf-release build --package otf-release --target ${{ matrix.name }}/${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: otf-release-${{ matrix.name }}-${{ matrix.arch }}
          path: .artifacts/otf-release

  github-release:
    needs: [check-release, build-otf-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.check-release.outputs.version }}"
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
          else
            notes_file="$(mktemp)"
            changelog_names=("")
            changelog_files=("CHANGELOG.md")
            for i in "${!changelog_files[@]}"; do
              changelog_file="${changelog_files[$i]}"
              changelog_name="${changelog_names[$i]}"
              if [ -z "$changelog_file" ] || [ ! -f "$changelog_file" ]; then
                continue
              fi
              section="$(awk -v version="$version" '
                $0 ~ "^## \\[?" version "\\]?" { in_section=1; next }
                in_section && /^## / { exit }
                in_section { print }
              ' "$changelog_file" | sed '/./,$!d')"
              if [ -n "$section" ]; then
                if [ -n "$changelog_name" ]; then
                  printf '### %s\n\n%s\n\n' "$changelog_name" "$section" >> "$notes_file"
                else
                  printf '%s\n' "$section" >> "$notes_file"
                fi
              fi
            done
            if [ -s "$notes_file" ]; then
              notes_arg=(--notes-file "$notes_file")
            else
              echo "No configured changelog notes found for $version; using GitHub generated notes."
              notes_arg=(--generate-notes)
            fi
            rm -rf ".flat-artifacts-otf-release"
            mkdir -p ".flat-artifacts-otf-release"
            shopt -s nullglob globstar
            for file in .artifacts/otf-release*/**/*; do
              if [ -f "$file" ]; then
                dir_name=$(basename "$(dirname "$file")")
                file_name=$(basename "$file")
                ext="${file_name##*.}"
                if [ "$ext" = "$file_name" ]; then
                  cp "$file" ".flat-artifacts-otf-release/${dir_name}"
                else
                  cp "$file" ".flat-artifacts-otf-release/${dir_name}.${ext}"
                fi
              fi
            done
            gh release create "$tag" --target main --title "$tag" "${notes_arg[@]}" .flat-artifacts-otf-release/*
          fi
