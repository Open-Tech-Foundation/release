name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2 | tr -d '"')"  # edit me: where the version lives
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-otf-release:
    needs: [check-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { target: "x86_64-unknown-linux-gnu", os: "ubuntu-latest" }  # edit me
          - { target: "x86_64-apple-darwin", os: "macos-latest" }  # edit me
          - { target: "x86_64-pc-windows-msvc", os: "windows-latest" }  # edit me
    steps:
      - uses: actions/checkout@v4
      - name: Build otf-release
        run: rustup target add ${{ matrix.target }} && cargo build --release --target ${{ matrix.target }}  # edit me: cross-compile with ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: otf-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/otf-release

  github-release:
    needs: [check-release, build-otf-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2 | tr -d '"')"  # edit me: where the version lives
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi
          gh release create "$tag" --title "$tag" --generate-notes .artifacts/**/*
