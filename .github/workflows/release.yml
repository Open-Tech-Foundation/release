name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      release_otf_release: ${{ steps.check.outputs.release_otf_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install otf-release
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - id: check
        run: |
          echo "should_release=$(otf-release check --exclude-package otf-release)" >> "$GITHUB_OUTPUT"
          echo "release_otf_release=$(otf-release check --package otf-release)" >> "$GITHUB_OUTPUT"

  matrix-otf-release:
    needs: [check-release]
    if: needs.check-release.outputs.release_otf_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install otf-release
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - id: set
        run: echo "matrix=$(otf-release matrix --package otf-release)" >> "$GITHUB_OUTPUT"

  build-otf-release:
    needs: [check-release, matrix-otf-release]
    if: needs.check-release.outputs.release_otf_release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-otf-release.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cross toolchain
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.arch }}-linux-gnu
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.vm }}
        with:
          targets: ${{ matrix.triple }}
      - name: Install otf-release
        if: runner.os != 'Windows'
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - name: Install otf-release
        if: runner.os == 'Windows'
        shell: pwsh
        run: irm https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.ps1 | iex
      - name: Build otf-release
        if: ${{ !matrix.vm }}
        run: otf-release build --package otf-release --target ${{ matrix.name }}/${{ matrix.arch }}
      - name: Build otf-release in a freebsd VM
        if: ${{ matrix.vm && matrix.name == 'freebsd' }}
        uses: vmactions/freebsd-vm@v1
        with:
          arch: ${{ matrix.arch }}
          usesh: true
          copyback: true
          prepare: |
            pkg install -y rust
          run: |
            cargo build --release --target ${{ matrix.triple }}
      - name: Stage otf-release
        if: ${{ matrix.vm }}
        run: otf-release build --package otf-release --target ${{ matrix.name }}/${{ matrix.arch }} --stage-only
      - uses: actions/upload-artifact@v4
        with:
          name: otf-release-${{ matrix.name }}-${{ matrix.arch }}
          path: .artifacts/otf-release

  github-release-otf-release:
    needs: [check-release, build-otf-release]
    if: needs.check-release.outputs.release_otf_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Install otf-release
        shell: bash
        run: curl -fsSL https://raw.githubusercontent.com/Open-Tech-Foundation/release/main/install.sh | bash
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: otf-release github-release --package otf-release --artifacts-dir .artifacts

