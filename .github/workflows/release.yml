name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write  # create tags and GitHub Releases

jobs:
  build-opentf-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { target: "x86_64-unknown-linux-gnu", os: "ubuntu-latest" }  # edit me
          - { target: "aarch64-apple-darwin", os: "macos-latest" }  # edit me
          - { target: "x86_64-pc-windows-msvc", os: "windows-latest" }  # edit me
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build opentf-release
        run: cargo build --release -p opentf-release --target ${{ matrix.target }}  # edit me: cross-compile with ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: opentf-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/otf-release*

  github-release:
    needs: [build-opentf-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"  # edit me: where the version lives
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi
          gh release create "$tag" --title "$tag" --generate-notes .artifacts/**/*
